name: News Digest Auto Update

on:
  schedule:
    - cron: '0 22 * * *'  # KST 07:00 (UTC 22:00 전날)
    - cron: '0 1 * * *'   # KST 10:00 (UTC 01:00)
    - cron: '0 3 * * *'   # KST 12:00 (UTC 03:00)
    - cron: '0 6 * * *'   # KST 15:00 (UTC 06:00)
  workflow_dispatch:       # GitHub에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine slot by KST hour
        id: slot
        run: |
          HOUR=$(TZ=Asia/Seoul date +%H)
          if [ "$HOUR" -lt 9 ]; then
            echo "slot=0700" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -lt 11 ]; then
            echo "slot=1000" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -lt 13 ]; then
            echo "slot=1200" >> $GITHUB_OUTPUT
          else
            echo "slot=1500" >> $GITHUB_OUTPUT
          fi

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python build_digest.py ${{ steps.slot.outputs.slot }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.json
          git diff --staged --quiet || git commit -m "chore: digest update (${{ steps.slot.outputs.slot }})"
          git push
