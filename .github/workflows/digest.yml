name: News Digest Auto Update

on:
  schedule:
    - cron: '7 0 * * *'   # KST 09:07 (UTC 00:07)
    - cron: '10 6 * * *'  # KST 15:10 (UTC 06:10)
  workflow_dispatch:       # GitHub에서 수동 실행 버튼

jobs:
  update-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine slot (morning / afternoon)
        id: slot
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "00" ]; then
            echo "slot=morning" >> $GITHUB_OUTPUT
          else
            echo "slot=afternoon" >> $GITHUB_OUTPUT
          fi

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python build_digest.py ${{ steps.slot.outputs.slot }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.json
          git diff --staged --quiet || git commit -m "chore: digest update (${{ steps.slot.outputs.slot }})"
          git push
