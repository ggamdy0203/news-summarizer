<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 뉴스 다이제스트</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Malgun Gothic", sans-serif;
    max-width: 720px; margin: 0 auto; padding: 16px;
    background: #f5f6f8; color: #222;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 13px; margin-bottom: 16px; }

  .nav { display: flex; gap: 8px; margin-bottom: 16px; }
  .nav a {
    flex: 1; text-align: center; padding: 9px 0; border-radius: 6px;
    font-size: 13px; text-decoration: none; color: #555; background: #fff;
    border: 1px solid #ddd;
  }
  .nav a.active { background: #2a4d8f; color: #fff; border-color: #2a4d8f; }

  .card {
    background: #fff; border-radius: 10px; padding: 16px;
    margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .card h2 { font-size: 16px; margin: 0 0 4px 0; }
  .card .digestTime { color: #999; font-size: 12px; margin-bottom: 12px; }

  .sourceGroup { margin-bottom: 12px; }
  .sourceGroup:last-child { margin-bottom: 0; }
  .sourceGroup h3 {
    font-size: 13px; color: #2a4d8f; margin: 0 0 2px 0;
    text-transform: uppercase; letter-spacing: 0.02em;
  }

  .newsRow { border-top: 1px solid #f2f2f2; }
  .sourceGroup .newsRow:first-of-type { border-top: none; }

  .newsItem {
    padding: 11px 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    border-radius: 6px;
  }
  .newsItem:hover { background: #f7f9fc; }
  .newsItem .itemTitle {
    color: #222; font-weight: 500; font-size: 14px; line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .newsItem.open .itemTitle, .newsItem:hover .itemTitle { color: #2a4d8f; }
  .newsItem .itemArrow {
    color: #bbb; font-size: 13px; flex-shrink: 0; transition: transform 0.15s ease;
  }
  .newsItem:hover .itemArrow { color: #2a4d8f; }
  .newsItem.open .itemArrow { transform: rotate(90deg); color: #2a4d8f; }
  .itemEmpty { font-size: 13px; color: #aaa; padding: 8px 4px; }

  .itemPanel {
    display: none; padding: 4px 4px 16px 4px; margin-top: -2px;
  }
  .itemPanel.open { display: block; }
  .itemPanel .panelError { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }
  .itemPanel .panelActions { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }

  #empty { color: #999; font-size: 13px; text-align: center; padding: 30px 0; }

  button {
    padding: 8px 14px; border-radius: 6px; border: none;
    background: #2a4d8f; color: #fff; font-size: 13px; cursor: pointer;
  }
  button:hover { background: #1f3a6e; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  button.secondary { background: #eee; color: #444; }
  button.secondary:hover { background: #ddd; }

  .summaryList { list-style: none; margin: 0; padding: 0; }
  .summaryList li {
    position: relative; padding: 6px 0 6px 20px;
    font-size: 14px; line-height: 1.55; color: #333;
    border-bottom: 1px solid #f3f3f3;
  }
  .summaryList li:last-child { border-bottom: none; }
  .summaryList li::before { content: "•"; position: absolute; left: 4px; color: #2a4d8f; font-weight: 700; }
  .itemPanel p { font-size: 14px; line-height: 1.6; white-space: pre-wrap; margin: 0; color: #333; }
</style>
</head>
<body>
  <h1>부동산 뉴스 다이제스트</h1>
  <div class="sub">매일 오전 9시 / 오후 3시, 한국경제·네이버 뉴스에서 자동으로 정리됩니다.</div>

  <div class="nav">
    <a href="index.html">🔗 링크 요약</a>
    <a href="digest.html" class="active">📰 자동 다이제스트</a>
  </div>

  <div id="list"></div>
  <div id="empty" style="display:none;">아직 생성된 다이제스트가 없습니다. 다음 정리 시간을 기다려주세요.</div>

  <script src="shared.js"></script>
  <script>
    function renderDigest(entry, entryIndex) {
      const sourceGroups = (entry.sections || []).map((section, sectionIndex) => {
        const items = (section.items || []).map((item, itemIndex) => {
          const rowId = `row-${entryIndex}-${sectionIndex}-${itemIndex}`;
          return `
          <div class="newsRow">
            <div class="newsItem" data-row-id="${rowId}"
                 data-title="${escapeHtml(item.title)}"
                 data-url="${escapeHtml(item.url)}"
                 data-summary="${escapeHtml(item.summary || "")}"
                 data-source="${escapeHtml(section.source)}">
              <div class="itemTitle">${escapeHtml(item.title)}</div>
              <div class="itemArrow">›</div>
            </div>
            <div class="itemPanel" id="panel-${rowId}"></div>
          </div>
        `;
        }).join("");
        return `
          <div class="sourceGroup">
            <h3>${escapeHtml(section.source)}</h3>
            ${items || '<div class="itemEmpty">새로 올라온 기사가 없습니다.</div>'}
          </div>
        `;
      }).join("");

      return `
        <div class="card">
          <h2>${escapeHtml(entry.label || "")}</h2>
          <div class="digestTime">${new Date(entry.createdAt).toLocaleString("ko-KR")}</div>
          ${sourceGroups}
        </div>
      `;
    }

    function renderPanelContent(data) {
      const alreadySaved = loadHistory().some(h => h.url === data.url);
      return `
        <div class="panelSummary">${renderSummaryHtml(data.summary || "(요약이 없습니다)")}</div>
        <div class="panelError"></div>
        <div class="panelActions">
          <button class="secondary" data-action="save" ${alreadySaved ? "disabled" : ""}>${alreadySaved ? "✓ 저장됨" : "⭐ 저장하기"}</button>
          <button class="secondary" data-action="deeper">🔄 다시 요약하기</button>
          <a href="${escapeHtml(data.url)}" target="_blank" rel="noopener"><button class="secondary" type="button">원문 보러가기 ↗</button></a>
        </div>
      `;
    }

    function bindItemClicks() {
      document.querySelectorAll(".newsItem[data-url]").forEach(itemEl => {
        itemEl.addEventListener("click", () => toggleRow(itemEl));
      });
    }

    function closeAllRows(except) {
      document.querySelectorAll(".newsItem.open").forEach(el => {
        if (el !== except) {
          el.classList.remove("open");
          document.getElementById(`panel-${el.dataset.rowId}`).classList.remove("open");
        }
      });
    }

    function toggleRow(itemEl) {
      const panel = document.getElementById(`panel-${itemEl.dataset.rowId}`);
      const isOpen = itemEl.classList.contains("open");
      closeAllRows(itemEl);
      if (isOpen) {
        itemEl.classList.remove("open");
        panel.classList.remove("open");
        return;
      }
      panel.innerHTML = renderPanelContent(itemEl.dataset);
      panel.classList.add("open");
      itemEl.classList.add("open");
      bindPanelActions(panel, itemEl.dataset);
      itemEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function bindPanelActions(panel, data) {
      const saveBtn = panel.querySelector('[data-action="save"]');
      saveBtn.addEventListener("click", () => {
        const added = addToHistory(data.url, data.summary, data.title);
        if (added) {
          saveBtn.disabled = true;
          saveBtn.textContent = "✓ 저장됨";
        }
      });

      const deeperBtn = panel.querySelector('[data-action="deeper"]');
      deeperBtn.addEventListener("click", async () => {
        const apiKey = loadApiKey();
        const errorEl = panel.querySelector(".panelError");
        errorEl.style.display = "none";

        if (!apiKey) {
          errorEl.textContent = "다시 요약하려면 먼저 \"🔗 링크 요약\" 탭에서 Gemini API 키를 입력해주세요.";
          errorEl.style.display = "block";
          return;
        }

        deeperBtn.disabled = true;
        deeperBtn.textContent = "요약 중...";
        try {
          const deeper = await summarizeUrl(data.url, apiKey);
          panel.querySelector(".panelSummary").innerHTML = renderSummaryHtml(deeper);
          deeperBtn.textContent = "✓ 더 자세히 요약 완료";
        } catch (err) {
          errorEl.textContent = err.message || "요약 중 오류가 발생했습니다.";
          errorEl.style.display = "block";
          deeperBtn.disabled = false;
          deeperBtn.textContent = "🔄 다시 요약하기";
        }
      });
    }

    async function load() {
      try {
        const res = await fetch(`digest.json?t=${Date.now()}`);
        if (!res.ok) throw new Error("not found");
        const data = await res.json();
        const entries = data.entries || [];

        if (entries.length === 0) {
          document.getElementById("empty").style.display = "block";
          return;
        }
        document.getElementById("list").innerHTML = entries.map(renderDigest).join("");
        bindItemClicks();
      } catch (e) {
        document.getElementById("empty").style.display = "block";
      }
    }

    load();
  </script>
</body>
</html>
