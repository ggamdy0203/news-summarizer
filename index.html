<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기사 링크 요약기</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Malgun Gothic", sans-serif;
    max-width: 720px; margin: 0 auto; padding: 16px;
    background: #f5f6f8; color: #222;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 13px; margin-bottom: 20px; }

  .card {
    background: #fff; border-radius: 10px; padding: 16px;
    margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .card h2 { font-size: 15px; margin: 0 0 10px 0; }

  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 9px 10px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; margin-bottom: 10px;
  }
  .row { display: flex; gap: 8px; }
  .row input { flex: 1; }

  button {
    padding: 9px 16px; border-radius: 6px; border: none;
    background: #2a4d8f; color: #fff; font-size: 14px; cursor: pointer;
  }
  button:hover { background: #1f3a6e; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  button.secondary { background: #eee; color: #444; }
  button.secondary:hover { background: #ddd; }
  button.danger { background: #c0392b; }
  button.danger:hover { background: #992d22; }

  #apiKeyStatus { font-size: 12px; color: #2a8f4d; margin-bottom: 6px; min-height: 16px; }
  #resultArea { display: none; margin-top: 14px; }
  #resultArea .resultMeta { font-size: 12px; color: #999; margin-bottom: 8px; word-break: break-all; }

  .summaryList {
    list-style: none; margin: 0; padding: 0;
  }
  .summaryList li {
    position: relative; padding: 6px 0 6px 20px;
    font-size: 14.5px; line-height: 1.55; color: #333;
    border-bottom: 1px solid #f3f3f3;
  }
  .summaryList li:last-child { border-bottom: none; }
  .summaryList li::before {
    content: "•"; position: absolute; left: 4px; color: #2a4d8f; font-weight: 700;
  }
  #resultSummary p, .histSummary p {
    font-size: 14px; line-height: 1.6; white-space: pre-wrap; margin: 0;
  }
  #errorArea { color: #c0392b; font-size: 13px; margin-top: 10px; display: none; }

  .historyItem {
    border-top: 1px solid #f0f0f0; padding: 10px 0;
  }
  .historyItem:first-child { border-top: none; }
  .historyItem .histTitle { font-weight: 600; font-size: 14px; cursor: pointer; }
  .historyItem .histTitle:hover { text-decoration: underline; }
  .historyItem .histMeta { font-size: 12px; color: #999; margin-top: 2px; }
  .historyItem .histSummary { font-size: 13px; color: #444; margin-top: 6px; white-space: pre-wrap; }
  .historyItem .histActions { margin-top: 6px; }
  .historyItem .histActions button { font-size: 12px; padding: 4px 10px; }
  #historyEmpty { color: #999; font-size: 13px; }
</style>
</head>
<body>
  <h1>기사 링크 요약기</h1>
  <div class="sub">기사 링크를 넣으면 Gemini AI가 직접 읽고 핵심만 3~4줄로 요약해줍니다.</div>

  <div class="card">
    <h2>⚙️ Gemini API 설정</h2>
    <label for="apiKeyInput">API 키</label>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy... 또는 AQ. 로 시작하는 키">
    <div id="apiKeyStatus"></div>
    <div style="font-size:12px;color:#999;">발급: <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> (무료)</div>
  </div>

  <div class="card">
    <h2>🔗 기사 링크 요약</h2>
    <label for="urlInput">기사 URL</label>
    <div class="row">
      <input type="text" id="urlInput" placeholder="https://...">
      <button id="summarizeBtn">요약하기</button>
    </div>
    <div id="errorArea"></div>
    <div id="resultArea">
      <div class="resultMeta" id="resultMeta"></div>
      <div class="summaryText" id="resultSummary"></div>
    </div>
  </div>

  <div class="card">
    <h2>📋 요약 기록</h2>
    <div style="text-align:right; margin-bottom:8px;">
      <button class="secondary" id="clearHistoryBtn">전체 삭제</button>
    </div>
    <div id="historyEmpty">아직 요약한 기사가 없습니다.</div>
    <div id="historyList"></div>
  </div>

  <script>
    const STORAGE_KEY_API = "news_summarizer_api_key";
    const STORAGE_KEY_HISTORY = "news_summarizer_history";
    const MODEL = "gemini-2.5-flash";

    function loadApiKey() {
      return localStorage.getItem(STORAGE_KEY_API) || "";
    }

    function saveApiKey(key) {
      localStorage.setItem(STORAGE_KEY_API, key);
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY_HISTORY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function saveHistory(history) {
      localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(history));
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function callGemini(apiKey, contents, tools) {
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;
      const body = { contents };
      if (tools) body.tools = tools;

      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });

      const data = await response.json();
      if (!response.ok) {
        const message = data.error && data.error.message ? data.error.message : `HTTP ${response.status}`;
        throw new Error(message);
      }
      return data;
    }

    function extractCandidateText(data) {
      const candidate = data.candidates && data.candidates[0];
      if (!candidate) return { text: "", status: null };
      const parts = (candidate.content && candidate.content.parts) || [];
      const text = parts.map(p => p.text || "").join("").trim();
      const urlMeta = candidate.urlContextMetadata && candidate.urlContextMetadata.urlMetadata;
      const status = urlMeta && urlMeta[0] && urlMeta[0].urlRetrievalStatus;
      return { text, status };
    }

    async function fetchArticleTextViaReader(url) {
      // 네이버 뉴스처럼 Gemini가 직접 못 읽는 사이트를 위한 우회 경로.
      // r.jina.ai는 임의 URL을 읽어서 정리된 텍스트로 반환해주는 무료 리더 서비스.
      const readerUrl = `https://r.jina.ai/${url}`;
      const response = await fetch(readerUrl);
      if (!response.ok) {
        throw new Error(`본문을 가져오지 못했습니다 (HTTP ${response.status}).`);
      }
      const text = await response.text();
      if (!text || text.trim().length < 50) {
        throw new Error("본문 내용이 너무 적어 요약할 수 없습니다.");
      }
      return text.slice(0, 16000);
    }

    const SUMMARY_FORMAT_INSTRUCTION =
      `요약은 3~4개의 핵심 포인트로 나눠서, 포인트마다 줄을 바꾸고 맨 앞에 "• "를 붙여줘. ` +
      `각 포인트는 한 문장으로 짧고 명확하게 써줘.`;

    async function summarizeUrl(url, apiKey) {
      const directPrompt = `다음 링크에 접속해서 글 내용을 읽고 핵심만 한국어로 요약해줘. ` +
        `${SUMMARY_FORMAT_INSTRUCTION} ` +
        `머릿말이나 따옴표 없이 바로 첫 포인트부터 시작해.\n\n링크: ${url}`;

      const directData = await callGemini(
        apiKey,
        [{ parts: [{ text: directPrompt }] }],
        [{ url_context: {} }]
      );
      const { text, status } = extractCandidateText(directData);

      if (status === "URL_RETRIEVAL_STATUS_SUCCESS" && text) {
        return text;
      }

      // Gemini가 직접 못 읽는 사이트(예: 네이버 뉴스)는 리더 서비스로 본문을 가져와 텍스트로 요약 요청
      const articleText = await fetchArticleTextViaReader(url);
      const fallbackPrompt = `다음은 어떤 기사 페이지에서 가져온 텍스트다. 광고/메뉴/구독 안내 같은 ` +
        `본문과 무관한 내용은 무시하고, 핵심만 한국어로 요약해줘. ${SUMMARY_FORMAT_INSTRUCTION} ` +
        `머릿말이나 따옴표 없이 바로 요약문부터 시작해.\n\n${articleText}`;
      const fallbackData = await callGemini(apiKey, [{ parts: [{ text: fallbackPrompt }] }]);
      const fallbackResult = extractCandidateText(fallbackData);

      return fallbackResult.text || "요약 내용을 생성하지 못했습니다.";
    }

    function renderSummaryHtml(summary) {
      const lines = summary.split("\n").map(l => l.trim()).filter(Boolean);
      const points = lines.map(l => l.replace(/^[•\-\*]\s*/, ""));
      if (points.length <= 1) {
        return `<p>${escapeHtml(summary)}</p>`;
      }
      return `<ul class="summaryList">${points.map(p => `<li>${escapeHtml(p)}</li>`).join("")}</ul>`;
    }

    function showResult(url, summary) {
      document.getElementById("resultMeta").textContent = url;
      document.getElementById("resultSummary").innerHTML = renderSummaryHtml(summary);
      document.getElementById("resultArea").style.display = "block";
    }

    function showError(message) {
      const errorEl = document.getElementById("errorArea");
      errorEl.textContent = message;
      errorEl.style.display = "block";
    }

    function clearError() {
      document.getElementById("errorArea").style.display = "none";
    }

    function renderHistory() {
      const history = loadHistory();
      const listEl = document.getElementById("historyList");
      const emptyEl = document.getElementById("historyEmpty");

      if (history.length === 0) {
        emptyEl.style.display = "block";
        listEl.innerHTML = "";
        return;
      }
      emptyEl.style.display = "none";

      listEl.innerHTML = history.map(item => `
        <div class="historyItem" data-id="${escapeHtml(item.id)}">
          <div class="histTitle" data-action="open">${escapeHtml(item.url)}</div>
          <div class="histMeta">${new Date(item.createdAt).toLocaleString("ko-KR")}</div>
          <div class="histSummary">${renderSummaryHtml(item.summary)}</div>
          <div class="histActions">
            <button class="secondary" data-action="visit">원문 보러가기 ↗</button>
            <button class="danger" data-action="delete">삭제</button>
          </div>
        </div>
      `).join("");

      listEl.querySelectorAll(".historyItem").forEach(el => {
        const id = el.dataset.id;
        const item = history.find(h => h.id === id);
        el.querySelector('[data-action="visit"]').addEventListener("click", () => {
          window.open(item.url, "_blank", "noopener");
        });
        el.querySelector('[data-action="delete"]').addEventListener("click", () => {
          const updated = loadHistory().filter(h => h.id !== id);
          saveHistory(updated);
          renderHistory();
        });
      });
    }

    function addToHistory(url, summary) {
      const history = loadHistory();
      history.unshift({
        id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        url,
        summary,
        createdAt: new Date().toISOString(),
      });
      saveHistory(history);
      renderHistory();
    }

    document.getElementById("apiKeyInput").addEventListener("change", (e) => {
      saveApiKey(e.target.value.trim());
      document.getElementById("apiKeyStatus").textContent = e.target.value.trim() ? "✓ 저장됨" : "";
    });

    document.getElementById("summarizeBtn").addEventListener("click", async () => {
      const apiKey = loadApiKey();
      const url = document.getElementById("urlInput").value.trim();
      clearError();
      document.getElementById("resultArea").style.display = "none";

      if (!apiKey) {
        showError("먼저 Gemini API 키를 입력해주세요.");
        return;
      }
      if (!url) {
        showError("기사 URL을 입력해주세요.");
        return;
      }

      const btn = document.getElementById("summarizeBtn");
      btn.disabled = true;
      btn.textContent = "요약 중...";
      try {
        const summary = await summarizeUrl(url, apiKey);
        showResult(url, summary);
        addToHistory(url, summary);
      } catch (err) {
        showError(err.message || "요약 중 오류가 발생했습니다.");
      } finally {
        btn.disabled = false;
        btn.textContent = "요약하기";
      }
    });

    document.getElementById("clearHistoryBtn").addEventListener("click", () => {
      if (confirm("요약 기록을 전체 삭제할까요?")) {
        saveHistory([]);
        renderHistory();
      }
    });

    (function init() {
      const savedKey = loadApiKey();
      if (savedKey) {
        document.getElementById("apiKeyInput").value = savedKey;
        document.getElementById("apiKeyStatus").textContent = "✓ 저장됨";
      }
      renderHistory();
    })();
  </script>
</body>
</html>
